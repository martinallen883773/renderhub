# ===============================================
# LastMailer - Fly.io configuration
# غيّر اسم التطبيق "app" إلى اسم فريد خاص بك
# ===============================================
app = "lastmailer"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
