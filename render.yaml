services:
  - type: web
    name: lastmailer
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    buildCommand: npm install --include=dev && npm run build && npm run db:push
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lastmailer-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: JACAT_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false

databases:
  - name: lastmailer-db
    plan: free
    region: frankfurt
